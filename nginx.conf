# Nginx configuration for EduVin AI
# Serves static files from dist/ and proxies API requests to Python FastAPI
#
# Usage:
#   1. Build the client: npm run build
#   2. Start FastAPI: cd server_py && python -m uvicorn main:app --host 127.0.0.1 --port 5000
#   3. Start nginx:  nginx -c $(pwd)/nginx.conf

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream FastAPI backend
    upstream fastapi_backend {
        server 127.0.0.1:5000;
    }

    server {
        listen 80;
        server_name _;

        # Root directory for static files (built by Vite)
        root /path/to/Web-App-Stack/dist;
        index index.html;

        # Proxy all /api requests to FastAPI
        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Serve static assets with long cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Serve other static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Favicon
        location = /favicon.png {
            expires 30d;
            add_header Cache-Control "public";
        }
    }
}
